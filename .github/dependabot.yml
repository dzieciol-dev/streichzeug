version: 2
updates:
  # Rust-Dependencies aus dem Tauri-Backend.
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "deps(rust)"
    # Major-Versions-Updates sortieren wir manuell — automatische PRs
    # nur für minor/patch. Sicherheits-Updates kommen via security-Alerts
    # immer (auch major).
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # ort 2.0.0-rc.12 hat einen Crate-internen Build-Bug
      # (vitis.rs:47 referenziert ein in ort-sys nicht existierendes
      # Feld; VitisAI-Provider ist nicht per Feature-Flag abschaltbar).
      # Entry entfernen, sobald rc.13 oder stable 2.0.0 draußen ist.
      - dependency-name: "ort"
        versions: ["2.0.0-rc.12"]

  # Frontend npm-Dependencies (Svelte + Vite + Tauri-API).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "deps(npm)"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions selbst aktuell halten — sonst veralten Action-Versionen
  # mit Sicherheitslücken in der CI.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "deps(actions)"
