name: Release

# Trigger:
# - Push eines Tags wie `v0.5.0` oder `v1.2.3` → baut Mac DMG + Win MSI
#   und hängt sie an einen GitHub-Release.
# - Manuell via Actions-UI (workflow_dispatch).
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  # Wir brauchen `contents: write`, damit der tauri-action ein Release
  # anlegen + Assets hochladen kann.
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }} ${{ matrix.rust_target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust_target: "aarch64-apple-darwin"
          # Intel-macOS als CROSS-COMPILE auf dem arm64-Runner: GitHub hat
          # die macos-13-Runner (letzte Intel-Runner) abgeschafft — der Job
          # bekam nie eine Maschine und lief bei v0.5.0/v0.5.1/v0.6.0 in
          # den 24h-Timeout; diese Releases haben deshalb kein Intel-DMG.
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust_target: "x86_64-apple-darwin"
          - platform: windows-latest
            args: ""
            rust_target: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v7

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          # `targets` für die jeweilige Ziel-Architektur (leer = Host)
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: release-${{ matrix.platform }}-${{ matrix.rust_target }}

      - name: Install frontend deps
        run: npm ci

      # NER-Feature aktivieren — Modell wird zur Laufzeit nachgeladen,
      # nicht im Bundle. `tauri.conf.json` deklariert keine Modell-
      # Resources mehr (siehe Public-Repo Release-Notes), daher braucht
      # die CI keine Placeholder-Files.
      - name: Build app (with NER feature)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Streichzeug ${{ github.ref_name }}"
          releaseBody: |
            ## Streichzeug ${{ github.ref_name }}

            ### Download

            - **macOS Apple Silicon (M1/M2/M3/M4)**: `Streichzeug_*_aarch64.dmg`
            - **macOS Intel**: `Streichzeug_*_x64.dmg`
            - **Windows 10/11**: `Streichzeug_*_x64-setup.exe` oder `Streichzeug_*_x64_en-US.msi`

            ### ⚠️ Windows: SmartScreen-Warnung beim ersten Start

            Der Installer ist aktuell **nicht** Code-signiert. Windows
            Defender SmartScreen zeigt deshalb beim Doppelklick
            „Der Computer wurde durch Windows geschützt". Behebung:

            1. Auf **„Weitere Informationen"** klicken.
            2. Dann erscheint der Button **„Trotzdem ausführen"** —
               diesen klicken.

            Sobald wir Code-Signing eingerichtet haben, ist der Schritt
            nicht mehr nötig.

            ### ⚠️ macOS: „App ist beschädigt"-Fehler

            Die Bundles sind aktuell **nicht** Apple-Developer-signiert
            (kein Apple Developer Account). Beim ersten Start blockt macOS
            das DMG mit einer Quarantäne-Meldung. Behebung:

            ```bash
            xattr -dr com.apple.quarantine /Applications/Streichzeug.app
            ```

            Danach App über Launchpad oder Finder starten — der Hinweis
            bleibt aus. Sobald wir Code-Signing eingerichtet haben, ist
            der Schritt nicht mehr nötig.

            **Alternativ** über Homebrew, kein xattr-Schritt nötig:

            ```bash
            brew install --cask dzieciol-dev/streichzeug/streichzeug
            ```

            ### NER-Modell

            Beim ersten Aktivieren der „Erweiterten Erkennung" lädt
            die App das NER-Modell (~145 MB) direkt von HuggingFace
            herunter. **Kein Modell ist im Bundle enthalten** — die
            App ist deutlich schlanker als die Beta-Versionen.

            ### macOS-Permissions

            Beim ersten Hotkey-Druck fragt macOS nach Accessibility-
            Permission (für das synthetische Cmd+V). Systemeinstellungen
            → Datenschutz & Sicherheit → Bedienungshilfen → Streichzeug
            aktivieren.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }} --features ner
